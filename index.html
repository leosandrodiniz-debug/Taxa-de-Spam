<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive War Room | Projeto 404</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --navy: #0B1C33; --teal: #0D9488; --mint: #10B981;
            --red: #EF4444; --yellow: #F59E0B; --bg: #F1F5F9;
            --border: #E2E8F0; --text: #1E293B; --muted: #64748B;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 24px; }
        .container { max-width: 1400px; margin: 0 auto; }

        header {
            background-color: var(--navy); color: white; padding: 16px 28px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;
        }
        .header-title h1 { font-size: 20px; font-weight: 800; }
        .filter-bar {
            background: white; padding: 12px; border-radius: 12px; border: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; gap: 15px;
        }
        .f-btn { 
            background: #f8fafc; border: 1px solid var(--border); padding: 8px 14px; 
            border-radius: 6px; font-size: 11px; color: var(--muted); cursor: pointer; font-weight: 600;
        }
        .f-btn.active { background: #EEF2FF; color: #4F46E5; border-color: #C7D2FE; }
        #calendar-input { padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border); font-size: 12px; width: 220px; cursor: pointer; }

        .grid-units { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        .unit-card { background: white; border-radius: 12px; padding: 22px; border: 1px solid var(--border); cursor: pointer; position: relative; }
        .unit-card.active.c404 { border: 2px solid var(--mint); }
        .unit-card.active.c2513 { border: 2px solid var(--red); }
        .pill-status { position: absolute; top: 20px; right: 20px; padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 800; }

        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card-white { background: white; border-radius: 12px; border: 1px solid var(--border); padding: 24px; min-height: 400px; }
        
        .table-wrap { max-height: 350px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; padding: 12px; background: #F8FAFC; position: sticky; top: 0; color: var(--muted); font-size: 10px; border-bottom: 1px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid var(--border); }
        .st-badge { padding: 4px 8px; border-radius: 4px; font-weight: 800; font-size: 10px; }

        #loader { 
            position: fixed; inset: 0; background: white; 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; z-index: 10000; font-weight: 700; color: var(--navy); 
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--navy); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div id="loader-msg">CONECTANDO À BASE DE DADOS...</div>
</div>

<div class="container">
    <header>
        <div class="header-title">
            <h1>Executive War Room | Projeto 404</h1>
            <p style="font-size: 10px; opacity: 0.7;">Sincronizado via Google Cloud (CSV Mode)</p>
        </div>
        <button class="f-btn" onclick="location.reload()">🔄 RECARREGAR</button>
    </header>

    <div class="filter-bar">
        <div style="display: flex; gap: 8px;">
            <button class="f-btn" onclick="applyPreset('today', this)">Hoje</button>
            <button class="f-btn active" onclick="applyPreset('7days', this)">7 dias</button>
            <button class="f-btn" onclick="applyPreset('30days', this)">30 dias</button>
            <button class="f-btn" onclick="applyPreset('all', this)">Tudo</button>
        </div>
        <input type="text" id="calendar-input" placeholder="📅 Período Personalizado">
    </div>

    <div class="grid-units">
        <div class="unit-card c404 active" id="card-404" onclick="selectProj('404')">
            <h3>Projeto 404</h3>
            <p id="count-404">--</p>
            <div class="pill-status" id="pill-404">--</div>
        </div>
        <div class="unit-card c2513" id="card-2513" onclick="selectProj('2513')">
            <h3>Projeto 2513</h3>
            <p id="count-2513">--</p>
            <div class="pill-status" id="pill-2513">--</div>
        </div>
    </div>

    <div class="main-grid">
        <div class="card-white">
            <canvas id="mainChart"></canvas>
        </div>
        <div class="card-white">
            <div class="table-wrap">
                <table id="mainTable">
                    <thead>
                        <tr><th>DATA</th><th>CAMPANHA</th><th>SPAM %</th><th>STATUS</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const sheetId = '1_zrTPZ9tehp5YmSrBXAehqwhsc5i9JOQnP3tNUdsS2o';
    const gid = '599913369';
    const csvUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&gid=${gid}`;

    let masterData = [];
    let filteredData = [];
    let activeProj = "404";
    let chartInstance = null;
    let fp = null;

    // Inicialização
    window.onload = () => {
        fp = flatpickr("#calendar-input", {
            mode: "range", locale: "pt", dateFormat: "d/m/Y",
            onChange: (dates) => {
                if (dates.length === 2) {
                    document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
                    filterData(dates[0], dates[1]);
                }
            }
        });
        loadData();
    };

    async function loadData() {
        try {
            const response = await fetch(csvUrl);
            const text = await response.text();
            const rows = text.split('\n').slice(1); // Pula o cabeçalho

            masterData = rows.map(row => {
                const cols = row.split(',');
                if (cols.length < 3) return null;
                
                const dateStr = cols[0].trim();
                const p = dateStr.split('/');
                const dObj = new Date(p[2], p[1]-1, p[0]);
                
                let sVal = parseFloat(cols[2].replace('%', '').replace('"', '')) || 0;
                // Se o valor vier como 0.001 em vez de 0.1, multiplica por 100
                if (sVal > 0 && sVal < 0.05) sVal *= 100;

                return {
                    label: dateStr,
                    date: dObj,
                    camp: cols[1].replace(/"/g, '').trim(),
                    spam: sVal
                };
            }).filter(d => d !== null && !isNaN(d.date.getTime()));

            document.getElementById('loader').style.display = 'none';
            applyPreset('7days');
        } catch (e) {
            document.getElementById('loader-msg').innerText = "Erro ao carregar dados. Verifique a publicação da planilha.";
        }
    }

    function applyPreset(type, el) {
        const end = new Date();
        const start = new Date();
        if(el) {
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }
        if(type === '7days') start.setDate(end.getDate() - 7);
        else if(type === '30days') start.setDate(end.getDate() - 30);
        else if(type === 'all') start.setDate(end.getDate() - 365);
        
        if(fp) fp.setDate([start, end]);
        filterData(start, end);
    }

    function filterData(start, end) {
        const s = start.setHours(0,0,0,0);
        const e = end.setHours(23,59,59,999);
        filteredData = masterData.filter(d => d.date >= s && d.date <= e);
        render();
    }

    function selectProj(id) {
        activeProj = id;
        document.querySelectorAll('.unit-card').forEach(c => c.classList.remove('active'));
        document.getElementById('card-'+id).classList.add('active');
        render();
    }

    function render() {
        const list = filteredData.filter(d => d.camp.includes(activeProj));
        
        // Cards
        ["404", "2513"].forEach(id => {
            const unitList = filteredData.filter(d => d.camp.includes(id));
            const avg = unitList.length ? unitList.reduce((a,b)=>a+b.spam,0)/unitList.length : 0;
            document.getElementById('count-'+id).innerText = `${unitList.length} registros encontrados`;
            const p = document.getElementById('pill-'+id);
            p.innerText = `${avg < 0.3 ? 'SAUDÁVEL' : 'CRÍTICO'} (${avg.toFixed(2)}%)`;
            p.style.color = avg < 0.3 ? "var(--mint)" : "var(--red)";
            p.style.background = avg < 0.3 ? "rgba(16,185,129,0.1)" : "rgba(239,68,68,0.1)";
        });

        // Tabela
        const tbody = document.querySelector('#mainTable tbody');
        tbody.innerHTML = list.slice().reverse().map(d => `
            <tr>
                <td>${d.label}</td>
                <td style="color:var(--teal); font-weight:600">${d.camp}</td>
                <td style="font-weight:700">${d.spam.toFixed(2)}%</td>
                <td><span class="st-badge" style="background:${d.spam < 0.3 ? '#DCFCE7':'#FEE2E2'}; color:${d.spam < 0.3 ? '#166534':'#991B1B'}">${d.spam < 0.3 ? 'OK':'ALERTA'}</span></td>
            </tr>
        `).join('');

        // Gráfico
        if(chartInstance) chartInstance.destroy();
        chartInstance = new Chart(document.getElementById('mainChart'), {
            type: 'line',
            data: {
                labels: list.map(d => d.label),
                datasets: [{
                    label: 'Spam %',
                    data: list.map(d => d.spam),
                    borderColor: '#0D9488',
                    tension: 0.3,
                    fill: false
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }
</script>
</body>
</html>
