<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto 404 — Executive War Room</title>
    <!-- Resolve o erro do Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --navy: #0A2540; --mint: #02C39A; --bg: #F4F6F9; }
        body { background: var(--bg); font-family: sans-serif; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .btn { background: var(--mint); border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border-bottom: 1px solid #ddd; padding: 10px; text-align: left; font-size: 13px; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; }
        .bom { background: #dcfce7; color: #166534; }
        #debug-console { background: #333; color: #0f0; padding: 10px; font-family: monospace; font-size: 11px; margin-top: 20px; border-radius: 5px; height: 100px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>Dashboard Solinero - Projeto <span id="proj-id">404</span></h2>
        <button class="btn" onclick="fetchData()">🔄 Sincronizar Agora</button>
    </div>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
    <div class="card">
        <h3>Tendência de Spam</h3>
        <canvas id="chartSpam" height="250"></canvas>
    </div>
    <div class="card">
        <h3>Log de Dados</h3>
        <table id="dataTable">
            <thead>
                <tr><th>Data</th><th>Campanha</th><th>Spam %</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div id="debug-console">Sistema iniciado. Aguardando sincronização...</div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/1Qad4P2nADyNtaYC1gegxFrHjzgUwanGisQ3Sv7AYbOE/export?format=csv&gid=372389848";

    let chart;

    function log(msg) {
        const consoleEl = document.getElementById("debug-console");
        consoleEl.innerHTML += `<br>> ${msg}`;
        consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    async function fetchData() {
        log("Iniciando requisição ao Google Sheets...");
        try {
            const response = await fetch(CSV_URL + "&t=" + Date.now());
            if (!response.ok) throw new Error("Não foi possível acessar a planilha. Verifique se ela foi PUBLICADA NA WEB.");
            
            const text = await response.text();
            log("Dados recebidos. Processando CSV...");
            parseCSV(text);
        } catch (err) {
            log("ERRO: " + err.message);
        }
    }

    function parseCSV(data) {
        const rows = data.split("\n").slice(1);
        const tbody = document.querySelector("#dataTable tbody");
        tbody.innerHTML = "";
        
        const labels = [];
        const values = [];

        rows.forEach(row => {
            const cols = row.split(",");
            if (cols.length >= 3) {
                const date = cols[0].trim();
                const campaign = cols[1].trim();
                const spam = parseFloat(cols[2].replace(",", ".").replace("%", ""));

                if (!isNaN(spam)) {
                    tbody.innerHTML += `<tr><td>${date}</td><td>${campaign}</td><td><b>${spam.toFixed(2)}%</b></td></tr>`;
                    labels.push(date);
                    values.push(spam);
                }
            }
        });

        updateChart(labels.reverse(), values.reverse());
        log("Interface atualizada com " + values.length + " registros.");
    }

    function updateChart(labels, values) {
        const ctx = document.getElementById('chartSpam').getContext('2d');
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{ label: 'Spam %', data: values, borderColor: '#02C39A', tension: 0.3, fill: true, backgroundColor: 'rgba(2, 195, 154, 0.1)' }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    window.onload = fetchData;
</script>

</body>
</html>
