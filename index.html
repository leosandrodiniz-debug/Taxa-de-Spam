<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Projeto 404 — Solinero MX</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --navy: #0A2540; --mint: #02C39A; --bg: #F4F6F9; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        header { background: var(--navy); color: white; padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn { background: var(--mint); border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .critico { background: #fee2e2; color: #991b1b; }
        .saudavel { background: #dcfce7; color: #166534; }
    </style>
</head>
<body>

<header>
    <div>
        <h1>Projeto 404 — Geral</h1>
        <p id="status-text">Aguardando sincronização...</p>
    </div>
    <button class="btn" onclick="fetchData()">🔄 Sincronizar Dados</button>
</header>

<div class="grid">
    <div class="card">
        <h3>Histórico de Spam (%)</h3>
        <div style="height: 300px;"><canvas id="chartSpam"></canvas></div>
    </div>
    <div class="card">
        <h3>Log de Campanhas</h3>
        <div style="max-height: 300px; overflow-y: auto;">
            <table id="dataTable">
                <thead>
                    <tr><th>DATA</th><th>CAMPANHA</th><th>SPAM %</th><th>STATUS</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // URL direta para exportação CSV da sua aba específica
    const CSV_URL = "https://docs.google.com/spreadsheets/d/1Qad4P2nADyNtaYC1gegxFrHjzgUwanGisQ3Sv7AYbOE/export?format=csv&gid=372389848";

    let chartInstance = null;

    async function fetchData() {
        const statusEl = document.getElementById("status-text");
        statusEl.innerText = "⏳ Conectando ao Google Sheets...";
        
        try {
            const response = await fetch(CSV_URL + "&cache=" + Date.now());
            if (!response.ok) throw new Error("Erro ao acessar planilha.");
            
            const text = await response.text();
            
            // Verifica se o retorno é HTML (erro de login) ou CSV
            if (text.includes("<!DOCTYPE html>")) {
                statusEl.innerText = "❌ Erro: Planilha não publicada! Vá em Arquivo > Compartilhar > Publicar na Web.";
                return;
            }

            parseCSV(text);
            statusEl.innerText = "✅ Sincronizado com sucesso!";
        } catch (err) {
            statusEl.innerText = "❌ Falha na conexão: " + err.message;
        }
    }

    function parseCSV(text) {
        const rows = text.split(/\r?\n/);
        const tbody = document.querySelector("#dataTable tbody");
        tbody.innerHTML = "";
        
        const labels = [];
        const values = [];

        // Descobrir se o separador é vírgula ou ponto e vírgula
        const firstLine = rows[0];
        const separator = firstLine.includes(";") ? ";" : ",";

        // Processar linhas (pula o cabeçalho)
        for (let i = 1; i < rows.length; i++) {
            if (!rows[i].trim()) continue;
            
            const cols = rows[i].split(separator);
            if (cols.length < 3) continue;

            const data = cols[0].trim();
            const campanha = cols[1].trim();
            // Limpa o valor do spam (remove %, troca vírgula por ponto)
            let spamRaw = cols[2].trim().replace("%", "").replace(",", ".");
            const spam = parseFloat(spamRaw);

            if (!isNaN(spam)) {
                const statusClass = spam >= 0.3 ? "critico" : "saudavel";
                const statusTxt = spam >= 0.3 ? "REMOVER" : "APROVADO";

                tbody.innerHTML += `
                    <tr>
                        <td>${data}</td>
                        <td style="font-weight:bold; color:#028090">${campanha}</td>
                        <td>${spam.toFixed(2)}%</td>
                        <td><span class="status-badge ${statusClass}">${statusTxt}</span></td>
                    </tr>`;
                
                labels.push(data);
                values.push(spam);
            }
        }

        updateChart(labels.reverse(), values.reverse());
    }

    function updateChart(labels, values) {
        const ctx = document.getElementById('chartSpam').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Taxa de Spam %',
                    data: values,
                    borderColor: '#02C39A',
                    backgroundColor: 'rgba(2, 195, 154, 0.1)',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { y: { beginAtZero: true } }
            }
        });
    }

    // Carregar dados automaticamente ao abrir
    window.onload = fetchData;
</script>

</body>
</html>
