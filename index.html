<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive War Room | Projeto 404</title>
    
    <!-- Bibliotecas -->
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --navy: #0B1C33; --teal: #0D9488; --mint: #10B981;
            --red: #EF4444; --yellow: #F59E0B; --bg: #F1F5F9;
            --border: #E2E8F0; --text: #1E293B; --muted: #64748B;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 24px; line-height: 1.4; }
        .container { max-width: 1400px; margin: 0 auto; }

        /* HEADER */
        header {
            background-color: var(--navy); color: white; padding: 14px 28px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;
        }
        .header-title h1 { font-size: 20px; font-weight: 800; }
        .header-title p { font-size: 11px; color: #94A3B8; }
        .header-actions { display: flex; gap: 10px; align-items: center; }
        .btn-top { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: white; padding: 7px 14px; border-radius: 8px; font-size: 10px; font-weight: 700; cursor: pointer; }

        /* DATE PICKER BAR */
        .date-filter-container {
            display: flex; align-items: center; justify-content: flex-end; 
            gap: 12px; margin-bottom: 24px; background: white; padding: 12px; 
            border-radius: 12px; border: 1px solid var(--border);
        }
        .date-presets { display: flex; gap: 8px; }
        .f-btn { 
            background: #f8fafc; border: 1px solid var(--border); padding: 6px 12px; 
            border-radius: 6px; font-size: 11px; color: var(--muted); cursor: pointer; font-weight: 600;
        }
        .f-btn.active { background: #EEF2FF; color: #4F46E5; border-color: #C7D2FE; }
        
        #date-range-picker {
            padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border);
            font-size: 11px; font-weight: 600; color: var(--text); width: 220px; cursor: pointer;
            background: #fff url('data:image/svg+xml;charset=UTF-8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>') no-repeat right 10px center;
        }

        /* GRID E CARDS */
        .grid-units { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;}
        .unit-card { background: white; border-radius: 12px; padding: 22px; border: 1px solid var(--border); cursor: pointer; position: relative; }
        .unit-card.active.c404 { border: 2.5px solid var(--mint); }
        .unit-card.active.c2513 { border: 2.5px solid var(--red); }
        .pill-status { position: absolute; top: 22px; right: 22px; padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 800; }

        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card-white { background: white; border-radius: 12px; border: 1px solid var(--border); padding: 24px; }
        
        /* TABELA */
        .table-wrap { max-height: 400px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 11.5px; }
        th { text-align: left; padding: 12px; background: #F8FAFC; position: sticky; top: 0; font-size: 10px; color: var(--muted); border-bottom: 1px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid var(--border); }
        .st-badge { padding: 4px 8px; border-radius: 4px; font-weight: 800; font-size: 10px; }

        #loader { position: fixed; inset: 0; background: white; display: flex; justify-content: center; align-items: center; z-index: 10000; font-weight: 800; }
    </style>
</head>
<body>

<div id="loader">SINCRONIZANDO...</div>

<div class="container">
    <header>
        <div class="header-title">
            <h1 id="top-h1">Geral / Projeto 404</h1>
            <p id="top-p">Atualizado em <span id="time-now"></span></p>
        </div>
        <div class="header-actions">
            <button class="btn-top" onclick="location.reload()">🔄 ATUALIZAR</button>
        </div>
    </header>

    <!-- BARRA DE DATAS ESTILO GOOGLE -->
    <div class="date-filter-container">
        <div class="date-presets">
            <button class="f-btn" onclick="setDateRange('today')">Hoje</button>
            <button class="f-btn" onclick="setDateRange('yesterday')">Ontem</button>
            <button class="f-btn active" onclick="setDateRange('7days')">Últimos 7 dias</button>
            <button class="f-btn" onclick="setDateRange('30days')">Últimos 30 dias</button>
            <button class="f-btn" onclick="setDateRange('month')">Mês atual</button>
            <button class="f-btn" onclick="setDateRange('all')">Todo histórico</button>
        </div>
        <input type="text" id="date-range-picker" placeholder="Selecionar período">
    </div>

    <div class="grid-units">
        <div class="unit-card c404 active" id="card-404" onclick="setProj('404')">
            <h2>Geral / Projeto 404</h2>
            <p id="count-404">Auditando...</p>
            <div class="pill-status" id="pill-404">--</div>
        </div>
        <div class="unit-card c2513" id="card-2513" onclick="setProj('2513')">
            <h2>Projeto 2513</h2>
            <p id="count-2513">Auditando...</p>
            <div class="pill-status" id="pill-2513">--</div>
        </div>
    </div>

    <div class="main-grid">
        <div class="card-white">
            <div style="font-size:11px; font-weight:800; margin-bottom:15px;">SPAM DIÁRIO (%)</div>
            <div style="height: 300px;"><canvas id="mainChart"></canvas></div>
        </div>
        <div class="card-white">
            <div class="table-wrap">
                <table id="mainTable">
                    <thead>
                        <tr><th>DATA</th><th>CAMPANHA</th><th>SPAM %</th><th>STATUS</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const ssId = '1_zrTPZ9tehp5YmSrBXAehqwhsc5i9JOQnP3tNUdsS2o';
    const gid = '599913369';
    
    let masterData = [];
    let filteredData = [];
    let currentProj = "404";
    let chartObj = null;
    let datePicker;

    // Configuração do Calendário Flatpickr
    document.addEventListener('DOMContentLoaded', function() {
        datePicker = flatpickr("#date-range-picker", {
            mode: "range",
            dateFormat: "d/m/Y",
            locale: "pt",
            onChange: function(selectedDates) {
                if (selectedDates.length === 2) {
                    filterByCustomRange(selectedDates[0], selectedDates[1]);
                }
            }
        });
    });

    google.charts.load('current', {'packages':['corechart']});
    google.charts.setOnLoadCallback(fetchData);

    function fetchData() {
        const query = new google.visualization.Query(`https://docs.google.com/spreadsheets/d/${ssId}/gviz/tq?tqx=out:json&gid=${gid}`);
        query.send(handleResponse);
    }

    function handleResponse(response) {
        if (response.isError()) return;
        const dt = response.getDataTable();
        masterData = [];
        for (let i = 0; i < dt.getNumberOfRows(); i++) {
            let s = dt.getValue(i, 2);
            if (s > 0 && s < 0.05) s *= 100;
            
            // Converter string de data DD/MM/YYYY para Objeto Date
            const dateStr = dt.getFormattedValue(i, 0);
            const parts = dateStr.split('/');
            const dateObj = new Date(parts[2], parts[1] - 1, parts[0]);

            masterData.push({
                data: dateStr,
                dateObj: dateObj,
                camp: dt.getValue(i, 1),
                spam: parseFloat(s) || 0
            });
        }
        document.getElementById('loader').style.display = 'none';
        document.getElementById('time-now').innerText = new Date().toLocaleString();
        setDateRange('7days'); // Filtro padrão inicial
    }

    function setDateRange(period) {
        const today = new Date();
        today.setHours(0,0,0,0);
        let start = new Date();
        let end = new Date();

        // Remove active dos botões
        document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
        if(event) event.target.classList.add('active');

        switch(period) {
            case 'today': start = today; break;
            case 'yesterday': start.setDate(today.getDate() - 1); end.setDate(today.getDate() - 1); break;
            case '7days': start.setDate(today.getDate() - 7); break;
            case '30days': start.setDate(today.getDate() - 30); break;
            case 'month': start = new Date(today.getFullYear(), today.getMonth(), 1); break;
            case 'all': start = new Date(2000, 0, 1); break;
        }
        
        filterByCustomRange(start, end);
        datePicker.setDate([start, end]);
    }

    function filterByCustomRange(start, end) {
        start.setHours(0,0,0,0);
        end.setHours(23,59,59,999);
        
        filteredData = masterData.filter(d => d.dateObj >= start && d.dateObj <= end);
        render();
    }

    function setProj(id) {
        currentProj = id;
        document.querySelectorAll('.unit-card').forEach(c => c.classList.remove('active'));
        document.getElementById(id === '404' ? 'card-404' : 'card-2513').classList.add('active');
        render();
    }

    function render() {
        const projData = filteredData.filter(d => String(d.camp).includes(currentProj));

        // Update Cards
        ["404", "2513"].forEach(id => {
            const f = filteredData.filter(d => String(d.camp).includes(id));
            const avg = f.length ? f.reduce((a,b)=>a+b.spam, 0)/f.length : 0;
            document.getElementById('count-'+id).innerText = `${f.length} disparos no período`;
            const p = document.getElementById('pill-'+id);
            p.innerText = `${avg < 0.3 ? 'SAUDÁVEL' : 'CRÍTICO'} (${avg.toFixed(2)}%)`;
            p.style.color = avg < 0.3 ? "var(--mint)" : "var(--red)";
        });

        // Table
        const tbody = document.querySelector('#mainTable tbody');
        tbody.innerHTML = projData.slice().reverse().map(d => {
            let cl = d.spam < 0.1 ? "#166534" : (d.spam < 0.3 ? "#854D0E" : "#991B1B");
            let bg = d.spam < 0.1 ? "#DCFCE7" : (d.spam < 0.3 ? "#FEF9C3" : "#FEE2E2");
            return `<tr><td>${d.data}</td><td>${d.camp}</td><td>${d.spam.toFixed(2)}%</td><td><span class="st-badge" style="background:${bg}; color:${cl}">${d.spam < 0.3 ? 'OK' : 'ALERTA'}</span></td></tr>`;
        }).join('');

        // Chart
        if(chartObj) chartObj.destroy();
        chartObj = new Chart(document.getElementById('mainChart'), {
            type: 'line',
            data: {
                labels: projData.map(d => d.data),
                datasets: [{ 
                    label: 'Spam %', data: projData.map(d => d.spam), 
                    borderColor: '#028090', tension: 0.3, fill: false 
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }
</script>
</body>
</html>
