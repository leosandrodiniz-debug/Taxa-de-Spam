<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive War Room | Solinero</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #05192d; --teal: #0D9488; --mint: #10B981;
            --red: #EF4444; --yellow: #F59E0B; --bg: #F1F5F9;
            --border: #E2E8F0; --text: #1E293B; --muted: #64748B;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; letter-spacing: -0.01em; }
        .container { max-width: 1440px; margin: 0 auto; }

        header {
            background: var(--navy); color: white; padding: 18px 30px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        .header-title h1 { font-size: 22px; font-weight: 700; }
        .badge-selo { background: var(--teal); color: white; padding: 6px 16px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; }

        .grid-units { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .unit-card { background: white; border-radius: 12px; padding: 25px; border: 1px solid var(--border); cursor: pointer; position: relative; transition: 0.3s; }
        .unit-card.active.c404 { border: 2px solid var(--mint); }
        .unit-card.active.c2513 { border: 2px solid var(--red); }
        .unit-card h2 { font-size: 16px; font-weight: 700; }
        .pill-status { position: absolute; top: 25px; right: 25px; padding: 5px 12px; border-radius: 6px; font-size: 10px; font-weight: 800; }

        .main-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 20px; }
        .card-white { background: white; padding: 25px; border-radius: 12px; border: 1px solid var(--border); }
        .card-title { font-size: 11px; font-weight: 800; color: var(--navy); text-transform: uppercase; margin-bottom: 20px; border-bottom: 1px solid #F1F5F9; padding-bottom: 10px; }

        .table-area { max-height: 450px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; padding: 14px; background: #F8FAFC; sticky: top; font-weight: 700; border-bottom: 1px solid var(--border); }
        td { padding: 14px; border-bottom: 1px solid var(--border); }
        .st-badge { padding: 4px 10px; border-radius: 6px; font-weight: 800; font-size: 10px; text-transform: uppercase; }

        #loader { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; font-weight: 800; color: var(--navy); }
        .spinner { width: 30px; height: 30px; border: 3px solid #f3f3f3; border-top: 3px solid var(--navy); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><span id="load-text">SINCRONIZANDO DADOS...</span></div>

<div class="container">
    <header>
        <div class="header-title">
            <h1 id="h-title">Geral / Projeto 404</h1>
            <p style="font-size:12px; color:#94A3B8;">Executive War Room - Dashboard</p>
        </div>
        <div class="badge-selo">Selo: SEM Aquisição</div>
    </header>

    <div class="grid-units">
        <div class="unit-card c404 active" id="card-404" onclick="setProj('404')">
            <h2>Geral / Projeto 404</h2>
            <p id="cnt-404">Analisando dados...</p>
            <div class="pill-status" id="pill-404">AGUARDANDO...</div>
        </div>
        <div class="unit-card c2513" id="card-2513" onclick="setProj('2513')">
            <h2>Projeto 2513 (MX02-Ep10)</h2>
            <p id="cnt-2513">Analisando dados...</p>
            <div class="pill-status" id="pill-2513">AGUARDANDO...</div>
        </div>
    </div>

    <div class="main-grid">
        <div class="card-white">
            <div class="card-title">SPAM DIÁRIO (%) — HISTÓRICO</div>
            <div style="height: 320px;"><canvas id="mainChart"></canvas></div>
        </div>
        <div class="card-white">
            <div class="card-title">📋 CAMPANHAS AUDITADAS</div>
            <div class="table-area">
                <table id="mainTable">
                    <thead>
                        <tr><th>DATA</th><th>IDENTIFICADOR</th><th>SPAM %</th><th>STATUS</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // URL DA SUA PLANILHA
    const ssId = '1Qad4P2nADyNtaYC1gegxFrHjzgUwanGisQ3Sv7AYbOE';
    const gid = '372389848';
    
    let masterData = [];
    let currentProj = "404";
    let chartInstance = null;

    google.charts.load('current', {'packages':['corechart']});
    google.charts.setOnLoadCallback(fetchData);

    function fetchData() {
        const query = new google.visualization.Query(`https://docs.google.com/spreadsheets/d/${ssId}/gviz/tq?tqx=out:json&gid=${gid}`);
        query.send(handleResponse);
    }

    function handleResponse(response) {
        if (response.isError()) {
            document.getElementById('load-text').innerHTML = `<span style="color:red">ERRO:</span> Verifique se a planilha está em Arquivo > Publicar na Web.`;
            return;
        }

        const dt = response.getDataTable();
        const rows = dt.getNumberOfRows();
        const cols = dt.getNumberOfColumns();
        
        // Mapeia colunas dinamicamente para evitar erro se você mudar a ordem
        let colData = 0, colCamp = 1, colSpam = 2;
        for(let j=0; j<cols; j++){
            let label = dt.getColumnLabel(j).toLowerCase();
            if(label.includes('data')) colData = j;
            if(label.includes('campanha') || label.includes('identificador')) colCamp = j;
            if(label.includes('spam')) colSpam = j;
        }

        masterData = [];
        for (let i = 0; i < rows; i++) {
            let sVal = dt.getValue(i, colSpam);
            if (sVal > 0 && sVal < 0.05) sVal *= 100;

            masterData.push({
                data: dt.getFormattedValue(i, colData),
                camp: dt.getValue(i, colCamp),
                spam: parseFloat(sVal) || 0
            });
        }

        document.getElementById('loader').style.display = 'none';
        render();
    }

    function setProj(id) {
        currentProj = id;
        document.querySelectorAll('.unit-card').forEach(c => c.classList.remove('active'));
        document.getElementById(id === '404' ? 'card-404' : 'card-2513').classList.add('active');
        document.getElementById('h-title').innerText = id === '404' ? "Geral / Projeto 404" : "Projeto 2513 (MX02-Ep10)";
        render();
    }

    function render() {
        ["404", "2513"].forEach(id => {
            const f = masterData.filter(d => String(d.camp).includes(id));
            const avg = f.length ? f.reduce((a,b)=>a+b.spam, 0)/f.length : 0;
            document.getElementById('cnt-'+id).innerText = `${f.length} disparos auditados`;
            const pill = document.getElementById('pill-'+id);
            const isGood = avg < 0.3;
            pill.innerText = `${isGood ? 'SAUDÁVEL':'CRÍTICO'} (${avg.toFixed(3)}%)`;
            pill.style.background = isGood ? "rgba(16, 185, 129, 0.1)" : "rgba(239, 68, 68, 0.1)";
            pill.style.color = isGood ? "var(--mint)" : "var(--red)";
        });

        const active = masterData.filter(d => String(d.camp).includes(currentProj));
        const tbody = document.querySelector('#mainTable tbody');
        tbody.innerHTML = active.slice().reverse().slice(0, 40).map(d => {
            let st = "Aprovado", bg = "#DCFCE7", cl = "#166534";
            if(d.spam >= 0.1) { st = "Otimizar"; bg = "#FEF9C3"; cl = "#854D0E"; }
            if(d.spam >= 0.3) { st = "Remover"; bg = "#FEE2E2"; cl = "#991B1B"; }
            return `<tr><td>${d.data}</td><td style="color:var(--teal); font-weight:700">${d.camp}</td><td style="font-weight:800">${d.spam.toFixed(2)}%</td><td><span class="st-badge" style="background:${bg}; color:${cl}">${st}</span></td></tr>`;
        }).join('');

        const chartD = active.slice(-12);
        if(chartInstance) chartInstance.destroy();
        chartInstance = new Chart(document.getElementById('mainChart'), {
            type: 'line',
            data: {
                labels: chartD.map(d => d.data),
                datasets: [{ label: 'Taxa Spam (%)', data: chartD.map(d => d.spam), borderColor: '#028090', backgroundColor: 'rgba(2, 128, 144, 0.05)', fill: true, tension: 0.4, pointRadius: 5, pointBackgroundColor: '#028090' }]
            },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { callback: v => v+'%' } } } }
        });
    }
</script>
</body>
</html>
