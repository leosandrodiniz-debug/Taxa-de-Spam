<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive War Room | Projeto 404</title>
    
    <!-- Bibliotecas Essenciais -->
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --navy: #0B1C33; --teal: #0D9488; --mint: #10B981;
            --red: #EF4444; --yellow: #F59E0B; --bg: #F1F5F9;
            --border: #E2E8F0; --text: #1E293B; --muted: #64748B;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 24px; }
        .container { max-width: 1400px; margin: 0 auto; }

        /* Header Estilo Print */
        header {
            background-color: var(--navy); color: white; padding: 16px 28px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;
        }
        .header-title h1 { font-size: 20px; font-weight: 800; }
        .header-title p { font-size: 11px; color: #94A3B8; }

        /* Barra de Filtros Estilo Google */
        .filter-bar {
            background: white; padding: 12px; border-radius: 12px; border: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; gap: 15px;
            flex-wrap: wrap;
        }
        .presets { display: flex; gap: 8px; }
        .f-btn { 
            background: #f8fafc; border: 1px solid var(--border); padding: 8px 14px; 
            border-radius: 6px; font-size: 11px; color: var(--muted); cursor: pointer; font-weight: 600;
        }
        .f-btn.active { background: #EEF2FF; color: #4F46E5; border-color: #C7D2FE; }
        
        #calendar-input {
            padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border);
            font-size: 12px; font-weight: 600; width: 220px; cursor: pointer; background: white;
        }

        /* Unidades */
        .grid-units { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        .unit-card { background: white; border-radius: 12px; padding: 22px; border: 1px solid var(--border); cursor: pointer; position: relative; }
        .unit-card.active.c404 { border: 2px solid var(--mint); }
        .unit-card.active.c2513 { border: 2px solid var(--red); }
        .pill-status { position: absolute; top: 20px; right: 20px; padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 800; }

        /* Dash */
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card-white { background: white; border-radius: 12px; border: 1px solid var(--border); padding: 24px; }
        
        .table-wrap { max-height: 400px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; padding: 12px; background: #F8FAFC; position: sticky; top: 0; color: var(--muted); border-bottom: 1px solid var(--border); font-size: 10px; }
        td { padding: 12px; border-bottom: 1px solid var(--border); }
        .st-badge { padding: 4px 8px; border-radius: 4px; font-weight: 800; font-size: 10px; }

        /* Loader */
        #loader { 
            position: fixed; inset: 0; background: white; 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; z-index: 10000; font-weight: 700; color: var(--navy); 
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--navy); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div id="loader-msg">SINCRONIZANDO DADOS...</div>
</div>

<div class="container">
    <header>
        <div class="header-title">
            <h1 id="top-h1">Geral / Projeto 404</h1>
            <p>Performance Operacional - <span id="time-now">--</span></p>
        </div>
        <button class="f-btn" style="background:rgba(255,255,255,0.1); color:white; border:none;" onclick="location.reload()">🔄 ATUALIZAR</button>
    </header>

    <div class="filter-bar">
        <div class="presets">
            <button class="f-btn" onclick="applyPreset('today', this)">Hoje</button>
            <button class="f-btn" onclick="applyPreset('yesterday', this)">Ontem</button>
            <button class="f-btn active" onclick="applyPreset('7days', this)">7 dias</button>
            <button class="f-btn" onclick="applyPreset('30days', this)">30 dias</button>
            <button class="f-btn" onclick="applyPreset('month', this)">Mês Atual</button>
            <button class="f-btn" onclick="applyPreset('all', this)">Tudo</button>
        </div>
        <input type="text" id="calendar-input" placeholder="📅 Selecionar período">
    </div>

    <div class="grid-units">
        <div class="unit-card c404 active" id="card-404" onclick="selectProj('404')">
            <h3>Geral / Projeto 404</h3>
            <p id="count-404">--</p>
            <div class="pill-status" id="pill-404">--</div>
        </div>
        <div class="unit-card c2513" id="card-2513" onclick="selectProj('2513')">
            <h3>Projeto 2513</h3>
            <p id="count-2513">--</p>
            <div class="pill-status" id="pill-2513">--</div>
        </div>
    </div>

    <div class="main-grid">
        <div class="card-white">
            <h4 style="font-size:11px; margin-bottom:15px; color:var(--muted)">TENDÊNCIA DE SPAM %</h4>
            <div style="height: 300px;"><canvas id="mainChart"></canvas></div>
        </div>
        <div class="card-white">
            <h4 style="font-size:11px; margin-bottom:15px; color:var(--muted)">LOGS FILTRADOS</h4>
            <div class="table-wrap">
                <table id="mainTable">
                    <thead>
                        <tr><th>DATA</th><th>CAMPANHA</th><th>SPAM %</th><th>STATUS</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const ssId = '1_zrTPZ9tehp5YmSrBXAehqwhsc5i9JOQnP3tNUdsS2o';
    const gid = '599913369';
    
    let rawData = [];
    let filteredData = [];
    let activeProj = "404";
    let myChart = null;
    let fp = null;

    // 1. Inicializar Calendário
    document.addEventListener('DOMContentLoaded', () => {
        fp = flatpickr("#calendar-input", {
            mode: "range",
            locale: "pt",
            dateFormat: "d/m/Y",
            onChange: (dates) => {
                if (dates.length === 2) {
                    document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
                    filterData(dates[0], dates[1]);
                }
            }
        });
    });

    // 2. Carregar do Google
    google.charts.load('current', {'packages':['corechart']});
    google.charts.setOnLoadCallback(() => {
        const query = new google.visualization.Query(`https://docs.google.com/spreadsheets/d/${ssId}/gviz/tq?tqx=out:json&gid=${gid}`);
        query.send(res => {
            if (res.isError()) {
                document.getElementById('loader-msg').innerText = "Erro ao ler Planilha!";
                return;
            }
            const dt = res.getDataTable();
            rawData = [];
            for (let i = 0; i < dt.getNumberOfRows(); i++) {
                const dateStr = dt.getFormattedValue(i, 0);
                const p = dateStr.split('/');
                if(p.length < 3) continue; // Pula se a data for inválida
                
                let s = dt.getValue(i, 2);
                if (s > 0 && s < 0.05) s *= 100;

                rawData.push({
                    dateLabel: dateStr,
                    dateObj: new Date(p[2], p[1]-1, p[0]),
                    camp: dt.getValue(i, 1),
                    spam: parseFloat(s) || 0
                });
            }
            
            document.getElementById('loader').style.display = 'none'; // REMOVE LOADER
            document.getElementById('time-now').innerText = new Date().toLocaleTimeString();
            applyPreset('7days'); 
        });
    });

    function applyPreset(type, el) {
        const end = new Date();
        end.setHours(23,59,59,999);
        let start = new Date();
        start.setHours(0,0,0,0);

        if(el) {
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        if(type === 'yesterday') { start.setDate(end.getDate() - 1); end.setDate(end.getDate() - 1); }
        else if(type === '7days') { start.setDate(end.getDate() - 7); }
        else if(type === '30days') { start.setDate(end.getDate() - 30); }
        else if(type === 'month') { start = new Date(end.getFullYear(), end.getMonth(), 1); }
        else if(type === 'all') { start = new Date(2020, 0, 1); }

        if(fp) fp.setDate([start, end]);
        filterData(start, end);
    }

    function filterData(start, end) {
        filteredData = rawData.filter(d => d.dateObj >= start && d.dateObj <= end);
        render();
    }

    function selectProj(id) {
        activeProj = id;
        document.querySelectorAll('.unit-card').forEach(c => c.classList.remove('active'));
        document.getElementById('card-'+id).classList.add('active');
        render();
    }

    function render() {
        // Atualiza Cards
        ["404", "2513"].forEach(id => {
            const list = filteredData.filter(d => String(d.camp).includes(id));
            const avg = list.length ? list.reduce((a,b)=>a+b.spam,0)/list.length : 0;
            document.getElementById('count-'+id).innerText = `${list.length} disparos no período`;
            const p = document.getElementById('pill-'+id);
            p.innerText = `${avg < 0.3 ? 'SAUDÁVEL' : 'CRÍTICO'} (${avg.toFixed(2)}%)`;
            p.style.color = avg < 0.3 ? "var(--mint)" : "var(--red)";
            p.style.background = avg < 0.3 ? "rgba(16, 185, 129, 0.1)" : "rgba(239, 68, 68, 0.1)";
        });

        const activeList = filteredData.filter(d => String(d.camp).includes(activeProj));

        // Tabela
        const tbody = document.querySelector('#mainTable tbody');
        tbody.innerHTML = activeList.slice().reverse().map(d => {
            const status = d.spam < 0.3 ? 'Aprovado' : 'Crítico';
            const color = d.spam < 0.3 ? '#166534' : '#991B1B';
            const bg = d.spam < 0.3 ? '#DCFCE7' : '#FEE2E2';
            return `<tr>
                <td>${d.dateLabel}</td>
                <td style="font-weight:600; color:var(--teal)">${d.camp}</td>
                <td style="font-weight:700">${d.spam.toFixed(2)}%</td>
                <td><span class="st-badge" style="background:${bg}; color:${color}">${status}</span></td>
            </tr>`;
        }).join('');

        // Gráfico
        if(myChart) myChart.destroy();
        const ctx = document.getElementById('mainChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: activeList.map(d => d.dateLabel),
                datasets: [{
                    label: 'Spam %',
                    data: activeList.map(d => d.spam),
                    borderColor: '#0D9488',
                    backgroundColor: 'rgba(13, 148, 136, 0.1)',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }
</script>

</body>
</html>
