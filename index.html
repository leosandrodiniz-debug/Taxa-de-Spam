<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive War Room | Projeto 404</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0B1C33; --teal: #0D9488; --mint: #10B981;
            --red: #EF4444; --yellow: #F59E0B; --bg: #F1F5F9;
            --border: #E2E8F0; --text: #1E293B; --muted: #64748B;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 24px; line-height: 1.4; }
        .container { max-width: 1400px; margin: 0 auto; }

        header {
            background-color: var(--navy); color: white; padding: 16px 28px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;
        }
        .header-title h1 { font-size: 20px; font-weight: 800; }
        .btn-top { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: white; padding: 8px 16px; border-radius: 8px; font-size: 10px; font-weight: 700; cursor: pointer; }

        /* BARRA DE FILTROS */
        .date-bar { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 24px; }
        .f-btn { background: white; border: 1px solid var(--border); padding: 10px 20px; border-radius: 25px; font-size: 11px; color: var(--muted); cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .f-btn.active { background: #EEF2FF; color: #4F46E5; border: 1px solid #C7D2FE; font-weight: 800; }

        .grid-units { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        .unit-card { background: white; border-radius: 12px; padding: 24px; border: 1px solid var(--border); cursor: pointer; position: relative; }
        .unit-card.active.c404 { border: 2px solid var(--mint); }
        .unit-card.active.c2513 { border: 2px solid var(--red); }
        .pill-status { position: absolute; top: 24px; right: 24px; padding: 4px 12px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; }

        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card-white { background: white; border-radius: 12px; border: 1px solid var(--border); padding: 24px; min-height: 450px; }
        .card-label { font-size: 11px; font-weight: 800; color: var(--navy); text-transform: uppercase; margin-bottom: 20px; }

        .table-wrap { max-height: 380px; overflow-y: auto; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; padding: 12px; background: #F8FAFC; position: sticky; top: 0; color: var(--muted); border-bottom: 1px solid var(--border); font-size: 10px; z-index: 10; }
        td { padding: 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        
        .st-badge { padding: 4px 10px; border-radius: 4px; font-weight: 800; font-size: 10px; display: inline-block; }
        .st-ok { background: #DCFCE7; color: #166534; }
        .st-alerta { background: #FEE2E2; color: #991B1B; }

        #loader { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; font-weight: 800; color: var(--navy); }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--navy); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div>CONECTANDO AOS DADOS...</div>

<div class="container">
    <header>
        <div class="header-title">
            <h1 id="top-h1">Geral / Projeto 404</h1>
            <p>Performance Operacional - Atualizado em <span id="time-now">--</span></p>
        </div>
        <button class="btn-top" onclick="location.reload()">🔄 ATUALIZAR</button>
    </header>

    <div class="date-bar">
        <button class="f-btn" onclick="applyFilter('today', this)">Hoje</button>
        <button class="f-btn" onclick="applyFilter('yesterday', this)">Ontem</button>
        <button class="f-btn" onclick="applyFilter('7days', this)">Últimos 7 dias</button>
        <button class="f-btn" onclick="applyFilter('30days', this)">Últimos 30 dias</button>
        <button class="f-btn active" id="btn-all" onclick="applyFilter('all', this)">Todo o histórico</button>
    </div>

    <div class="grid-units">
        <div class="unit-card c404 active" id="card-404" onclick="setProj('404')">
            <h2 style="font-size: 18px;">Geral / Projeto 404</h2>
            <p id="count-404" style="font-size: 11px; color: var(--muted); margin-top: 4px;">Carregando...</p>
            <div class="pill-status" id="pill-404">--</div>
        </div>
        <div class="unit-card c2513" id="card-2513" onclick="setProj('2513')">
            <h2 style="font-size: 18px;">Projeto 2513</h2>
            <p id="count-2513" style="font-size: 11px; color: var(--muted); margin-top: 4px;">Carregando...</p>
            <div class="pill-status" id="pill-2513">--</div>
        </div>
    </div>

    <div class="main-grid">
        <div class="card-white">
            <div class="card-label">SPAM DIÁRIO (%)</div>
            <div style="height: 350px;"><canvas id="mainChart"></canvas></div>
        </div>
        <div class="card-white">
            <div class="card-label">DETALHAMENTO DE LOGS</div>
            <div class="table-wrap">
                <table id="mainTable">
                    <thead>
                        <tr><th>DATA</th><th>CAMPANHA</th><th>SPAM %</th><th>STATUS</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const ssId = '1_zrTPZ9tehp5YmSrBXAehqwhsc5i9JOQnP3tNUdsS2o';
    const gid = '372389848';
    
    let masterData = [];
    let currentFiltered = [];
    let activeProj = "404";
    let chartObj = null;

    google.charts.load('current', {'packages':['corechart']});
    google.charts.setOnLoadCallback(fetchData);

    function fetchData() {
        const query = new google.visualization.Query(`https://docs.google.com/spreadsheets/d/${ssId}/gviz/tq?tqx=out:json&gid=${gid}`);
        query.send(res => {
            if (res.isError()) {
                document.getElementById('loader').innerText = "Erro ao carregar dados da planilha.";
                return;
            }
            const dt = res.getDataTable();
            masterData = [];
            for (let i = 0; i < dt.getNumberOfRows(); i++) {
                const label = dt.getFormattedValue(i, 0);
                const parts = label.split('/');
                // Garantir que a data seja interpretada corretamente (DD/MM/YYYY)
                const dateObj = new Date(parts[2], parts[1] - 1, parts[0]);
                
                let spamVal = dt.getValue(i, 2);
                if (spamVal > 0 && spamVal < 0.05) spamVal *= 100;

                masterData.push({
                    label: label,
                    date: dateObj,
                    camp: String(dt.getValue(i, 1)),
                    spam: parseFloat(spamVal) || 0
                });
            }
            document.getElementById('loader').style.display = 'none';
            document.getElementById('time-now').innerText = new Date().toLocaleString('pt-BR');
            
            // Iniciar exibindo TUDO para garantir que os dados apareçam como no print
            applyFilter('all', document.getElementById('btn-all'));
        });
    }

    function applyFilter(mode, btn) {
        document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');

        const now = new Date();
        now.setHours(23, 59, 59, 999);
        let start = new Date();
        start.setHours(0, 0, 0, 0);

        if (mode === 'all') {
            currentFiltered = [...masterData];
        } else {
            if (mode === 'today') { /* start já é hoje 00:00 */ }
            if (mode === 'yesterday') { 
                start.setDate(now.getDate() - 1); 
                now.setDate(now.getDate() - 1);
            }
            if (mode === '7days') start.setDate(now.getDate() - 7);
            if (mode === '30days') start.setDate(now.getDate() - 30);
            
            currentFiltered = masterData.filter(d => d.date >= start && d.date <= now);
        }
        render();
    }

    function setProj(id) {
        activeProj = id;
        document.querySelectorAll('.unit-card').forEach(c => c.classList.remove('active'));
        document.getElementById('card-' + id).classList.add('active');
        render();
    }

    function render() {
        // Atualiza Cards das Unidades
        ["404", "2513"].forEach(id => {
            const list = currentFiltered.filter(d => d.camp.toLowerCase().includes(id));
            const avg = list.length ? list.reduce((a,b) => a + b.spam, 0) / list.length : 0;
            
            document.getElementById('count-' + id).innerText = `${list.length} disparos auditados`;
            const p = document.getElementById('pill-' + id);
            const ok = avg < 0.3;
            p.innerText = `${ok ? 'SAUDÁVEL':'CRÍTICO'} (${avg.toFixed(2)}%)`;
            p.style.color = ok ? "var(--mint)" : "var(--red)";
            p.style.background = ok ? "rgba(16, 185, 129, 0.1)" : "rgba(239, 68, 68, 0.1)";
        });

        // Filtrar dados para a unidade selecionada (404 ou 2513)
        const activeList = currentFiltered.filter(d => d.camp.toLowerCase().includes(activeProj));

        // Tabela de Logs
        const tbody = document.querySelector('#mainTable tbody');
        if (activeList.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:40px; color:var(--muted)">Nenhum disparo encontrado para este período.</td></tr>';
        } else {
            tbody.innerHTML = activeList.slice().reverse().map(d => {
                const isOk = d.spam < 0.3;
                return `<tr>
                    <td>${d.label}</td>
                    <td style="color:var(--teal); font-weight:600">${d.camp}</td>
                    <td style="font-weight:700">${d.spam.toFixed(2)}%</td>
                    <td><span class="st-badge ${isOk ? 'st-ok' : 'st-alerta'}">${isOk ? 'OK' : 'ALERTA'}</span></td>
                </tr>`;
            }).join('');
        }

        // Gráfico de Tendência
        if (chartObj) chartObj.destroy();
        const ctx = document.getElementById('mainChart').getContext('2d');
        
        // Se houver muitos dados, o gráfico no print parece denso, vamos manter a tensão para suavizar
        chartObj = new Chart(ctx, {
            type: 'line',
            data: {
                labels: activeList.map(d => d.label),
                datasets: [{
                    label: 'Spam %',
                    data: activeList.map(d => d.spam),
                    borderColor: '#0D9488',
                    backgroundColor: 'rgba(13, 148, 136, 0.05)',
                    fill: true,
                    tension: 0.3,
                    pointRadius: activeList.length > 50 ? 0 : 3
                }]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, ticks: { font: { size: 10 } } },
                    x: { ticks: { font: { size: 9 }, maxRotation: 45, minRotation: 45 } }
                },
                plugins: { legend: { display: false } }
            }
        });
    }
</script>
</body>
</html>
