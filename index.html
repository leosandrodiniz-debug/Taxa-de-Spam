<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive War Room | Projeto 404</title>
    
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --navy: #0B1C33; --teal: #0D9488; --mint: #10B981;
            --red: #EF4444; --yellow: #F59E0B; --bg: #F1F5F9;
            --border: #E2E8F0; --text: #1E293B; --muted: #64748B;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 24px; }
        .container { max-width: 1400px; margin: 0 auto; }

        header {
            background-color: var(--navy); color: white; padding: 16px 28px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;
        }
        .header-title h1 { font-size: 20px; font-weight: 800; }
        .btn-top { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 16px; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; }

        .filter-bar {
            background: white; padding: 12px; border-radius: 12px; border: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; gap: 15px; flex-wrap: wrap;
        }
        .f-btn { 
            background: #f8fafc; border: 1px solid var(--border); padding: 8px 14px; 
            border-radius: 6px; font-size: 11px; color: var(--muted); cursor: pointer; font-weight: 600;
        }
        .f-btn.active { background: #EEF2FF; color: #4F46E5; border-color: #C7D2FE; }
        #date-range { padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border); font-size: 12px; width: 230px; cursor: pointer; background: white; }

        .grid-units { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        .unit-card { background: white; border-radius: 12px; padding: 22px; border: 2px solid transparent; border: 1px solid var(--border); cursor: pointer; position: relative; }
        .unit-card.active.c404 { border: 2px solid var(--mint) !important; }
        .unit-card.active.c2513 { border: 2px solid var(--red) !important; }
        .pill-status { position: absolute; top: 20px; right: 20px; padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 800; }

        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card-white { background: white; border-radius: 12px; border: 1px solid var(--border); padding: 24px; min-height: 400px; }
        
        .table-wrap { max-height: 350px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; padding: 12px; background: #F8FAFC; position: sticky; top: 0; color: var(--muted); font-size: 10px; border-bottom: 1px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid var(--border); }
        .st-badge { padding: 4px 8px; border-radius: 4px; font-weight: 800; font-size: 10px; }

        #loader { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; font-weight: 700; color: var(--navy); }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--navy); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div>SINCRONIZANDO DATA LAKES...</div>

<div class="container">
    <header>
        <div class="header-title">
            <h1 id="top-h1">Geral / Projeto 404</h1>
            <p id="top-p" style="font-size:10px; opacity:0.8;">Status: Conectado à Planilha Oficial</p>
        </div>
        <button class="btn-top" onclick="location.reload()">🔄 ATUALIZAR AGORA</button>
    </header>

    <div class="filter-bar">
        <div style="display: flex; gap: 6px;">
            <button class="f-btn" onclick="setPreset('7days', this)">Últimos 7 dias</button>
            <button class="f-btn" onclick="setPreset('30days', this)">Últimos 30 dias</button>
            <button class="f-btn active" id="btn-all" onclick="setPreset('all', this)">Todo histórico</button>
        </div>
        <input type="text" id="date-range" placeholder="📅 Filtrar por Calendário">
    </div>

    <div class="grid-units">
        <div class="unit-card c404 active" id="card-404" onclick="setProj('404')">
            <h3 style="font-size:16px;">Geral / Projeto 404</h3>
            <p id="count-404" style="font-size:12px; color:var(--muted);">Calculando...</p>
            <div class="pill-status" id="pill-404">--</div>
        </div>
        <div class="unit-card c2513" id="card-2513" onclick="setProj('2513')">
            <h3 style="font-size:16px;">Projeto 2513</h3>
            <p id="count-2513" style="font-size:12px; color:var(--muted);">Calculando...</p>
            <div class="pill-status" id="pill-2513">--</div>
        </div>
    </div>

    <div class="main-grid">
        <div class="card-white">
            <p style="font-size:10px; font-weight:800; color:var(--muted); margin-bottom:15px; text-transform: uppercase;">Tendência Histórica de Spam</p>
            <div style="height:320px;"><canvas id="mainChart"></canvas></div>
        </div>
        <div class="card-white">
            <p style="font-size:10px; font-weight:800; color:var(--muted); margin-bottom:15px; text-transform: uppercase;">Detalhamento de Logs</p>
            <div class="table-wrap">
                <table id="mainTable">
                    <thead>
                        <tr><th>DATA</th><th>CAMPANHA</th><th>SPAM %</th><th>STATUS</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const ssId = '1_zrTPZ9tehp5YmSrBXAehqwhsc5i9JOQnP3tNUdsS2o';
    const gid = '599913369';
    
    let masterData = [];
    let filteredData = [];
    let currentProj = "404";
    let chartObj = null;
    let fp = null;

    // Inicia Calendário
    document.addEventListener('DOMContentLoaded', () => {
        fp = flatpickr("#date-range", {
            mode: "range", locale: "pt", dateFormat: "d/m/Y",
            onChange: (dates) => {
                if (dates.length === 2) {
                    document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
                    filterByDates(dates[0], dates[1]);
                }
            }
        });
    });

    google.charts.load('current', {'packages':['corechart']});
    google.charts.setOnLoadCallback(fetchData);

    function fetchData() {
        const query = new google.visualization.Query(`https://docs.google.com/spreadsheets/d/${ssId}/gviz/tq?tqx=out:json&gid=${gid}`);
        query.send(res => {
            if (res.isError()) {
                document.getElementById('loader').innerText = "Erro: Verifique se a planilha está pública.";
                return;
            }
            const dt = res.getDataTable();
            masterData = [];
            
            for (let i = 0; i < dt.getNumberOfRows(); i++) {
                // Tenta pegar a data de várias formas para não travar
                let rawDate = dt.getValue(i, 0);
                let dateLabel = dt.getFormattedValue(i, 0);
                let dateObj;

                if (rawDate instanceof Date) {
                    dateObj = rawDate;
                } else {
                    const p = String(dateLabel).split('/');
                    dateObj = new Date(p[2], p[1]-1, p[0]);
                }

                let sVal = dt.getValue(i, 2);
                if (sVal > 0 && sVal < 0.05) sVal *= 100;

                masterData.push({
                    label: dateLabel,
                    date: dateObj,
                    camp: String(dt.getValue(i, 1) || ""),
                    spam: parseFloat(sVal) || 0
                });
            }
            
            document.getElementById('loader').style.display = 'none';
            // IMPORTANTE: Ao carregar, ele ignora o filtro e mostra TUDO
            filteredData = [...masterData]; 
            render();
        });
    }

    function setPreset(mode, btn) {
        const end = new Date();
        const start = new Date();
        
        document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        if(mode === '7days') start.setDate(end.getDate() - 7);
        else if(mode === '30days') start.setDate(end.getDate() - 30);
        else if(mode === 'all') {
            filteredData = [...masterData];
            if(fp) fp.clear();
            render();
            return;
        }
        
        if(fp) fp.setDate([start, end]);
        filterByDates(start, end);
    }

    function filterByDates(start, end) {
        const s = new Date(start).setHours(0,0,0,0);
        const e = new Date(end).setHours(23,59,59,999);
        filteredData = masterData.filter(d => d.date.getTime() >= s && d.date.getTime() <= e);
        render();
    }

    function setProj(id) {
        currentProj = id;
        document.querySelectorAll('.unit-card').forEach(c => c.classList.remove('active'));
        document.getElementById('card-'+id).classList.add('active');
        document.getElementById('top-h1').innerText = id === '404' ? "Geral / Projeto 404" : "Projeto 2513";
        render();
    }

    function render() {
        // Atualiza os Cards Superiores
        ["404", "2513"].forEach(id => {
            const list = filteredData.filter(d => d.camp.toLowerCase().includes(id));
            const avg = list.length ? list.reduce((a,b)=>a+b.spam, 0)/list.length : 0;
            document.getElementById('count-'+id).innerText = `${list.length} disparos auditados`;
            const p = document.getElementById('pill-'+id);
            p.innerText = `${avg < 0.3 ? 'SAUDÁVEL':'CRÍTICO'} (${avg.toFixed(2)}%)`;
            p.style.color = avg < 0.3 ? "var(--mint)" : "var(--red)";
            p.style.background = avg < 0.3 ? "rgba(16,185,129,0.1)" : "rgba(239,68,68,0.1)";
        });

        // Filtra para a Unidade Selecionada
        const activeList = filteredData.filter(d => d.camp.toLowerCase().includes(currentProj));

        // Tabela
        const tbody = document.querySelector('#mainTable tbody');
        tbody.innerHTML = activeList.slice().reverse().map(d => `
            <tr>
                <td>${d.label}</td>
                <td style="color:var(--teal); font-weight:600">${d.camp}</td>
                <td style="font-weight:700">${d.spam.toFixed(2)}%</td>
                <td><span class="st-badge" style="background:${d.spam < 0.3 ? '#DCFCE7':'#FEE2E2'}; color:${d.spam < 0.3 ? '#166534':'#991B1B'}">${d.spam < 0.3 ? 'OK':'ALERTA'}</span></td>
            </tr>
        `).join('');

        // Gráfico
        if(chartObj) chartObj.destroy();
        const ctx = document.getElementById('mainChart').getContext('2d');
        chartObj = new Chart(ctx, {
            type: 'line',
            data: {
                labels: activeList.map(d => d.label),
                datasets: [{
                    label: 'Spam %', data: activeList.map(d => d.spam),
                    borderColor: '#0D9488', backgroundColor: 'rgba(13,148,136,0.05)',
                    fill: true, tension: 0.3, pointRadius: 4
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }
</script>
</body>
</html>
