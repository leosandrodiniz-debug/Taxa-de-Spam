<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto 404 — Solinero MX | Executive War Room</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --navy-dark: #0A2540; --teal: #028090; --mint: #02C39A;
            --alert-red: #E63946; --alert-yellow: #F4A261; --bg-light: #F4F6F9;
            --card-bg: #FFFFFF; --text-dark: #1E293B; --text-muted: #64748B;
            --border-color: #E2E8F0; --purple-select: #4F46E5; --purple-light: #EEF2FF;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-dark); padding: 24px; }
        .container { max-width: 1440px; margin: 0 auto; }
        header {
            background-color: var(--navy-dark); color: white; padding: 20px 32px; border-radius: 12px;
            margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center;
        }
        .btn-sync {
            background-color: var(--mint); color: var(--navy-dark); padding: 10px 20px; border-radius: 20px;
            font-size: 12px; font-weight: 700; border: none; cursor: pointer; transition: all 0.2s;
        }
        .btn-sync:hover { transform: scale(1.05); background-color: #02b08b; }
        .grid-hub-top { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .hub-card { 
            background: var(--card-bg); border-radius: 10px; padding: 14px 20px; border: 1px solid var(--border-color); 
            cursor: pointer; position: relative; transition: 0.2s;
        }
        .hub-card.active-main { border: 2px solid var(--navy-dark); background-color: #F8FAFC; }
        .hub-indicator { position: absolute; left: 0; top: 0; bottom: 0; width: 6px; border-radius: 10px 0 0 10px; }
        .grid-graficos { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        .chart-card, .table-container { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); }
        .chart-container { height: 300px; width: 100%; }
        .table-project { width: 100%; border-collapse: collapse; font-size: 13px; }
        .table-project th { background: #F8FAFC; padding: 12px; text-align: left; border-bottom: 1px solid var(--border-color); }
        .table-project td { padding: 12px; border-bottom: 1px solid var(--border-color); }
        .badge-status { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; }
        .badge-bom { background: #DCFCE7; color: #166534; }
        .badge-medio { background: #FEF3C7; color: #92400E; }
        .badge-ruim { background: #FEE2E2; color: #991B1B; }
        .filtro-master-wrapper { display: flex; justify-content: flex-end; margin-bottom: 20px; }
        .trigger-datepicker { background: white; border: 1px solid var(--border-color); padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: 600; }
        footer { text-align: center; padding: 20px; font-size: 12px; color: var(--text-muted); }
        #custom-toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 id="txt-header-titulo">Geral / Projeto 404</h1>
            <p style="font-size: 12px; opacity: 0.8;">Sincronizado com Google Sheets</p>
        </div>
        <button class="btn-sync" onclick="sincronizarGoogleSheets()">🔄 Sincronizar Agora</button>
    </header>

    <div class="grid-hub-top" id="hub-projetos-container">
        <!-- Projetos aparecem aqui -->
    </div>

    <div class="filtro-master-wrapper">
        <button class="trigger-datepicker">Período: <span id="txt-faixa-ativa-label">Últimos 30 dias</span></button>
    </div>

    <div class="grid-graficos">
        <div class="chart-card">
            <h3 style="margin-bottom:15px; font-size:14px;">Tendência de Spam (%)</h3>
            <div class="chart-container"><canvas id="gSpamDia"></canvas></div>
        </div>
        <div class="table-container">
            <h3 style="margin-bottom:15px; font-size:14px;">Últimas Campanhas</h3>
            <table class="table-project" id="tabela-broadcast-dados">
                <thead>
                    <tr><th>DATA</th><th>CAMPANHA</th><th>SPAM</th><th>STATUS</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <footer>
        PROJETO 404 | Monitoramento de Entregabilidade Postmaster
    </footer>
</div>

<div id="custom-toast-container"></div>

<script>
    // ============================================================
    // 1. COLOQUE O LINK DA SUA PLANILHA (CSV) ABAIXO:
    // ============================================================
    const SPREADSHEET_CSV_URL = "COLOQUE_SEU_LINK_AQUI"; 

    let LOGS_PLANILHA = {};
    let activeChart = null;
    const DADOS = { activeProjectId: "404" };

    function showToast(msg) {
        const t = document.createElement("div");
        t.style.background = "#0A2540"; t.style.color = "white"; t.style.padding = "12px 20px";
        t.style.borderRadius = "8px"; t.style.marginBottom = "10px"; t.innerText = msg;
        document.getElementById("custom-toast-container").appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    async function sincronizarGoogleSheets() {
        try {
            const res = await fetch(SPREADSHEET_CSV_URL + "&cache=" + Date.now());
            const csvText = await res.text();
            processarCSV(csvText);
            showToast("Dados atualizados com sucesso!");
        } catch (e) {
            showToast("Erro ao conectar com a planilha.");
        }
    }

    function processarCSV(csv) {
        const lines = csv.split("\n");
        const tempLogs = {};
        const projetosDetectados = new Set();

        lines.slice(1).forEach(line => {
            const cols = line.split(",");
            if (cols.length < 3) return;

            const dataRaw = cols[0].trim();
            const campanha = cols[1].trim();
            const spam = parseFloat(cols[2].replace(",", ".").replace("%", ""));

            if (!dataRaw || isNaN(spam)) return;

            // Formata data para DD/MM
            let dataFormatada = dataRaw;
            if (dataRaw.includes("-")) {
                const p = dataRaw.split("-");
                dataFormatada = `${p[2]}/${p[1]}`;
            }

            if (!tempLogs[dataFormatada]) tempLogs[dataFormatada] = [];
            tempLogs[dataFormatada].push({ id: campanha, spam: spam });

            const idProj = campanha.match(/\d+/) ? campanha.match(/\d+/)[0] : "Outros";
            projetosDetectados.add(idProj);
        });

        LOGS_PLANILHA = tempLogs;
        renderizarTudo(Array.from(projetosDetectados));
    }

    function renderizarTudo(projetos) {
        // Renderizar Cards de Projetos
        const container = document.getElementById("hub-projetos-container");
        container.innerHTML = projetos.map(p => `
            <div class="hub-card ${p === DADOS.activeProjectId ? 'active-main' : ''}" onclick="DADOS.activeProjectId='${p}'; renderizarTudo([${projetos.map(x=>"'"+x+"'") }])">
                <div class="hub-indicator" style="background: ${p === '404' ? '#02C39A' : '#4F46E5'}"></div>
                <strong>Projeto ${p}</strong>
            </div>
        `).join("");

        // Renderizar Tabela
        const tbody = document.querySelector("#tabela-broadcast-dados tbody");
        let htmlTabela = "";
        let labelsGrafico = [];
        let valoresGrafico = [];

        Object.keys(LOGS_PLANILHA).reverse().slice(0, 10).forEach(data => {
            LOGS_PLANILHA[data].forEach(item => {
                if (item.id.includes(DADOS.activeProjectId)) {
                    const status = item.spam < 0.1 ? "BOM" : (item.spam < 0.3 ? "MEDIO" : "RUIM");
                    const classe = item.spam < 0.1 ? "badge-bom" : (item.spam < 0.3 ? "badge-medio" : "badge-ruim");
                    
                    htmlTabela += `<tr>
                        <td>${data}</td>
                        <td>${item.id}</td>
                        <td>${item.spam.toFixed(2)}%</td>
                        <td><span class="badge-status ${classe}">${status}</span></td>
                    </tr>`;
                    
                    labelsGrafico.push(data);
                    valoresGrafico.push(item.spam);
                }
            });
        });
        tbody.innerHTML = htmlTabela;

        // Renderizar Gráfico
        if (activeChart) activeChart.destroy();
        const ctx = document.getElementById('gSpamDia').getContext('2d');
        activeChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labelsGrafico.reverse(),
                datasets: [{
                    label: 'Spam %',
                    data: valoresGrafico.reverse(),
                    borderColor: '#4F46E5',
                    tension: 0.3,
                    fill: true,
                    backgroundColor: 'rgba(79, 70, 229, 0.1)'
                }]
            },
            options: { maintainAspectRatio: false }
        });
    }

    // Iniciar
    window.onload = sincronizarGoogleSheets;
</script>

</body>
</html>
